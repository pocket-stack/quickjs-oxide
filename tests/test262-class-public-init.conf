# Focused R3g admission profile for public class initialization.
#
# This is the authenticated R3g admission profile. The runner accepts it only
# together with its exact frozen hash and manifest; the global profile keeps
# class and all three target feature tags disabled, so this focused gate does
# not enable whole-feature class support globally.
#
# The manifest excludes the computed-property-names matrix, private elements,
# modules, Proxy, async/generator forms, and other adjacent capabilities. Its
# remaining computed-key cases are ordinary class-field forms covered by R3g.

[features]
arrow-function
class
class-fields-public
class-static-block
class-static-fields-public
new.target

