# Focused derived-class and super() profile.
#
# The global profile deliberately keeps whole-feature class support disabled.
# This runner-bound profile admits only the frozen dependency-audited cohort;
# fields, private elements, static blocks, async/generator forms, unsupported
# intrinsics, modules, and host hooks are excluded by the manifest gate.

[features]
AggregateError
Map
Reflect
Reflect.construct
Set
String.prototype.replaceAll
Symbol
Symbol.iterator
Symbol.replace
Symbol.species
arrow-function
class
new.target
object-spread
regexp-named-groups
set-methods
super

