# Focused R3ad profile for public ordinary async class methods.
#
# This profile is valid only with its hash-pinned 294-path manifest. Public
# methods adjacent to already-supported synchronous private elements are in
# scope; private async methods and all async-generator forms stay fail-closed.

[features]
Symbol
arrow-function
async-functions
async-iteration
class
class-fields-private
class-fields-public
class-methods-private
class-static-fields-private
class-static-methods-private
computed-property-names
default-parameters
rest-parameters

