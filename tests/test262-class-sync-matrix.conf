# Focused R3y profile for the pinned synchronous class generated-matrix closure.
#
# The bound manifest covers the class dstr/elements matrix under both class
# expressions and declarations. Its source-audited exclusion inventory keeps
# untagged async class methods and Proxy-dependent tests fail-closed.
# Whole-feature class, computed names, default parameters, and object rest
# remain disabled in the global Test262 capability profile.

[features]
BigInt
Symbol
Symbol.iterator
Symbol.toPrimitive
arrow-function
class
class-fields-private
class-fields-public
class-methods-private
class-static-fields-private
class-static-fields-public
class-static-methods-private
computed-property-names
default-parameters
destructuring-binding
generators
new.target
object-rest
object-spread

