Math.sumPrecise
Reflect
Reflect.construct
Reflect.set
Reflect.setPrototypeOf
String.prototype.at
String.prototype.endsWith
String.prototype.matchAll
String.prototype.replaceAll
Symbol
Symbol.isConcatSpreadable
Symbol.match
Symbol.matchAll
Symbol.replace
Symbol.search
Symbol.split
__proto__
change-array-by-copy
exponentiation
for-in-order
hashbang
regexp-modifiers

