# quickjs-oxide Test262 capability profile.
#
# Features declare surfaces whose tests are eligible to execute; their failures
# remain visible conformance gaps. Negative tests are exact pinned-suite paths
# whose expected exception provenance has been audited. Both lists are
# deliberately fail-closed and bytewise sorted.

[features]
